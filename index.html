<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>ZOLOTO N1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}

:root{
  --bg1:#0c0a06;
  --glass:rgba(255,220,80,0.05);
  --glass2:rgba(255,220,80,0.1);
  --glass-border:rgba(255,200,50,0.18);
  --text:#f5ead0;
  --sub:rgba(210,185,120,0.7);
  --gold:#f5c842;
  --gold2:#ffd966;
  --gold3:#e8a800;
  --green:#34d399;
  --green2:#10b981;
  --ph:rgba(180,150,80,0.4);
  --r:20px;
  --shadow:0 8px 40px rgba(0,0,0,0.6);
  --glow:0 0 50px rgba(245,200,66,0.12);
}

body{
  background:var(--bg1);
  background-image:
    radial-gradient(ellipse 70% 45% at 15% -5%, rgba(245,200,66,0.1) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 85% 105%, rgba(232,168,0,0.08) 0%, transparent 50%);
  color:var(--text);
  min-height:100vh;
  padding:1rem;
  display:flex;flex-direction:column;align-items:center;
}
.app{max-width:860px;width:100%}

/* ── CARD ── */
.card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:var(--r);
  border:1px solid var(--glass-border);
  box-shadow:var(--shadow),var(--glow);
  padding:1.4rem 1.4rem 1.2rem;
  margin-bottom:1rem;
}

/* ── HEADER ── */
.head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1.3rem}

/* ZOLOTO N1 — animatsiyali sarlavha */
.zoloto-title{
  font-family:'Cinzel',serif;
  font-size:1.75rem;
  font-weight:900;
  letter-spacing:.04em;
  background:linear-gradient(90deg,
    #8B6914 0%,
    #c9962a 15%,
    #f5c842 30%,
    #fff8dc 45%,
    #ffd966 55%,
    #f5c842 65%,
    #c9962a 80%,
    #8B6914 100%
  );
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:goldShine 3s linear infinite;
  display:flex;align-items:center;gap:10px;
  text-shadow:none;
  filter:drop-shadow(0 0 12px rgba(245,200,66,0.5));
}
.zoloto-title i{
  -webkit-text-fill-color:initial;
  color:var(--gold);
  animation:iconPulse 2.5s ease-in-out infinite;
  filter:drop-shadow(0 0 8px rgba(245,200,66,0.7));
}
@keyframes goldShine{
  0%{background-position:0% center}
  100%{background-position:200% center}
}
@keyframes iconPulse{
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 6px rgba(245,200,66,0.6))}
  50%{transform:scale(1.15);filter:drop-shadow(0 0 14px rgba(245,200,66,0.95))}
}

/* N1 badge */
.badge{
  background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));
  color:#1a1200;
  font-size:.75rem;padding:.22rem .85rem;
  border-radius:30px;font-weight:800;
  box-shadow:0 2px 12px rgba(245,200,66,0.45);
  letter-spacing:.03em;
  font-family:'Cinzel',serif;
}

/* Dark toggle */
#darkBtn{
  background:var(--glass2);
  border:1px solid var(--glass-border);
  color:var(--text);
  padding:.48rem 1rem;border-radius:30px;
  font-size:.83rem;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;
  cursor:pointer;backdrop-filter:blur(10px);
  transition:all .18s;
}
#darkBtn:hover{background:rgba(245,200,66,0.15);border-color:rgba(245,200,66,0.4)}

/* ── BUTTONS ── */
.row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:.9rem}
.btn{
  border:1px solid var(--glass-border);
  color:var(--text);padding:.52rem 1.1rem;
  border-radius:30px;font-size:.87rem;font-weight:600;
  display:inline-flex;align-items:center;gap:7px;
  cursor:pointer;background:var(--glass);
  backdrop-filter:blur(10px);
  transition:all .15s;white-space:nowrap;user-select:none;
}
.btn:hover{
  background:var(--glass2);
  border-color:rgba(245,200,66,0.35);
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,0,0,0.4);
}
.btn.pri{
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  border-color:transparent;color:#1a1200;font-weight:700;
  box-shadow:0 4px 18px rgba(245,200,66,0.4);
}
.btn.pri:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 24px rgba(245,200,66,0.55);
}
.btn.grn{
  background:linear-gradient(135deg,var(--green),var(--green2));
  border-color:transparent;color:#fff;
  box-shadow:0 4px 18px rgba(52,211,153,0.3);
}
.btn.grn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(52,211,153,0.45)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* ── DROP ZONE ── */
.drop-zone{
  border:1.5px dashed rgba(245,200,66,0.3);
  border-radius:18px;
  padding:3rem 1.5rem;text-align:center;cursor:pointer;
  transition:all .2s;position:relative;
  background:rgba(245,200,66,0.03);
}
.drop-zone:hover,.drop-zone.over{
  border-color:var(--gold);
  background:rgba(245,200,66,0.07);
  box-shadow:0 0 30px rgba(245,200,66,0.1);
}
.drop-zone i.big{
  font-size:2.6rem;color:var(--gold);opacity:.6;
  display:block;margin-bottom:.8rem;
  filter:drop-shadow(0 0 10px rgba(245,200,66,0.5));
}
.drop-zone .dt{font-size:1rem;font-weight:700;margin-bottom:.3rem;color:var(--text)}
.drop-zone .ds{font-size:.83rem;color:var(--sub)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* ── PROGRESS ── */
.prog-wrap{margin:.8rem 0 .4rem;display:none}
.prog-bar{background:rgba(255,255,255,0.08);border-radius:30px;height:6px;overflow:hidden}
.prog-fill{
  height:6px;
  background:linear-gradient(90deg,var(--gold3),var(--gold),var(--gold2));
  width:0%;border-radius:30px;transition:width .1s;
  box-shadow:0 0 10px rgba(245,200,66,0.6);
}
.prog-lbl{font-size:.8rem;color:var(--sub);font-weight:600;margin-top:6px;text-align:center}

/* ── STATS ── */
.stats{
  display:flex;justify-content:space-between;
  font-size:.8rem;color:var(--sub);font-weight:600;
  padding:0 .2rem;margin-top:.4rem;
}
.stats b{color:var(--gold)}

/* ── CHIPS ── */
.chips-wrap{display:none}
.chips-ttl{font-size:.72rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:.35rem .85rem .35rem .75rem;
  border-radius:30px;font-size:.82rem;font-weight:600;
  border:1px solid var(--glass-border);
  background:var(--glass);color:var(--sub);
  cursor:pointer;backdrop-filter:blur(8px);
  transition:all .15s;user-select:none;
}
.chip.on{
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  border-color:transparent;color:#1a1200;font-weight:700;
  box-shadow:0 3px 14px rgba(245,200,66,0.4);
}
.chip:hover:not(.on){background:var(--glass2);color:var(--text);border-color:rgba(245,200,66,0.3)}
.chip .cnt{background:rgba(0,0,0,0.2);padding:.04rem .38rem;border-radius:20px;font-size:.74rem}
.chip.on .cnt{background:rgba(0,0,0,0.25)}
.chip .x{margin-left:2px;opacity:.5;font-size:.74rem;transition:opacity .1s}
.chip .x:hover{opacity:1;color:#f87171}

/* ── VIEWER ── */
.viewer{text-align:center}
.vtabs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:1.1rem}
.vtab{
  padding:.33rem .85rem;border-radius:30px;
  border:1px solid var(--glass-border);
  background:var(--glass);color:var(--sub);
  font-size:.79rem;font-weight:600;
  cursor:pointer;backdrop-filter:blur(8px);transition:all .15s;user-select:none;
}
.vtab.on{
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  border-color:transparent;color:#1a1200;font-weight:700;
  box-shadow:0 3px 14px rgba(245,200,66,0.4);
}
.vtab:hover:not(.on){background:var(--glass2);color:var(--text)}
.vpname{
  font-size:1rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold2),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:1rem;
  display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;
}
.vpname i{-webkit-text-fill-color:initial;color:var(--gold)}

.qbox{
  background:rgba(245,200,66,0.05);
  padding:1.1rem;border-radius:24px;
  display:inline-block;
  border:1px solid rgba(245,200,66,0.2);
  box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 30px rgba(245,200,66,0.08);
  margin-bottom:.9rem;backdrop-filter:blur(12px);
}
.qbox img{
  width:min(270px,68vw);height:auto;aspect-ratio:1/1;
  display:block;border-radius:14px;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));
}
.qtxt{
  font-size:.8rem;font-weight:700;word-break:break-all;
  background:rgba(245,200,66,0.08);
  padding:.5rem 1rem;border-radius:30px;
  border:1px solid rgba(245,200,66,0.2);
  color:var(--gold2);
  display:inline-block;max-width:96%;
  margin:.1rem auto .5rem;
  font-family:'Courier New',monospace;
}
.qidx{font-size:.85rem;font-weight:700;color:var(--sub);margin-bottom:.7rem}
.dl1{
  padding:.45rem 1.1rem;border-radius:30px;
  border:1px solid rgba(52,211,153,0.4);
  background:rgba(52,211,153,0.08);
  color:var(--green);font-size:.82rem;font-weight:700;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  transition:all .15s;backdrop-filter:blur(8px);
}
.dl1:hover{
  background:linear-gradient(135deg,var(--green),var(--green2));
  border-color:transparent;color:#fff;
  box-shadow:0 4px 16px rgba(52,211,153,0.4);
}
.navrow{display:flex;justify-content:center;gap:12px;margin-top:1rem}
.nb{
  width:58px;height:58px;border-radius:16px;
  border:1px solid var(--glass-border);
  background:var(--glass);cursor:pointer;font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);
  box-shadow:0 4px 14px rgba(0,0,0,0.4);
  transition:all .15s;user-select:none;
}
.nb:hover{
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  border-color:transparent;color:#1a1200;
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(245,200,66,0.45);
}

/* Placeholder */
.ph-box{
  padding:3.5rem 1.5rem;
  border:1px dashed rgba(245,200,66,0.2);
  border-radius:16px;color:var(--ph);text-align:center;
}
.ph-box i{font-size:2rem;opacity:.3;display:block;margin-bottom:.9rem}
.ph-box p{font-size:.92rem;font-weight:600}

/* Animations */
.sR{animation:sR .2s ease}
.sL{animation:sL .2s ease}
@keyframes sR{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes sL{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}

/* Light mode */
body.light{
  --bg1:#fdf8ee;
  --glass:rgba(180,130,0,0.06);
  --glass2:rgba(180,130,0,0.12);
  --glass-border:rgba(180,130,0,0.2);
  --text:#2a1f00;
  --sub:#7a6020;
  --ph:#b09040;
  background-image:
    radial-gradient(ellipse 70% 45% at 15% -5%, rgba(245,200,66,0.15) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 85% 105%, rgba(232,168,0,0.1) 0%, transparent 50%);
  background-color:var(--bg1);
}
body.light select{background:rgba(255,248,220,0.9);color:var(--text)}
body.light option{background:#fdf8ee}
body.light textarea{background:rgba(255,248,220,0.8);color:var(--text)}

footer{
  margin-top:.4rem;text-align:center;font-size:.76rem;
  padding-bottom:.8rem;
  color:rgba(180,150,80,0.4);
  font-family:'Cinzel',serif;letter-spacing:.05em;
}

@media(max-width:560px){
  .row{justify-content:center}
  .zoloto-title{font-size:1.35rem}
  .nb{width:52px;height:52px;font-size:1.1rem}
}
</style>
</head>
<body>
<div class="app">

<!-- HEADER CARD -->
<div class="card">
  <div class="head">
    <div class="zoloto-title"><i class="fas fa-crown"></i> ZOLOTO_N1 <span class="badge" id="bdg">0 kod</span></div>
    <button class="btn" id="darkBtn"><i class="fas fa-sun"></i> Light</button>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="zipInput" accept=".zip">
    <i class="fas fa-file-archive big"></i>
    <div class="dt">ZIP faylni shu yerga tashlang yoki bosib tanlang</div>
    <div class="ds">miyras_datamatrix.zip &middot; faqat .zip format</div>
  </div>

  <!-- Progress -->
  <div class="prog-wrap" id="pw">
    <div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
    <div class="prog-lbl" id="pl">Ochilmoqda...</div>
  </div>

  <div class="stats">
    <span>Mahsulotlar: <b id="sTotalP">0</b></span>
    <span>Jami kodlar: <b id="sTotalC">0</b></span>
  </div>
</div>

<!-- CHIPS CARD -->
<div class="card chips-wrap" id="chipsCard">
  <div class="chips-ttl"><i class="fas fa-layer-group"></i>&nbsp; Mahsulotlar &mdash; bosib o&#39;ting</div>
  <div class="chips" id="chipsEl"></div>
</div>

<!-- VIEWER CARD -->
<div class="card viewer" id="vcard" style="display:none"></div>

<!-- RESET ROW -->
<div id="resetRow" style="display:none;text-align:center;margin-bottom:1rem">
  <button class="btn" id="resetBtn"><i class="fas fa-redo"></i> Yangi ZIP yuklash</button>
</div>

<footer><i class="fas fa-crown"></i> ZOLOTO_N1 &middot; ZIP Viewer</footer>
</div>

<input type="file" id="zipInput2" accept=".zip" style="display:none">

<script>
(function(){
"use strict";

const dropZone  = document.getElementById('dropZone');
const zipInput  = document.getElementById('zipInput');
const pw        = document.getElementById('pw');
const pf        = document.getElementById('pf');
const pl        = document.getElementById('pl');
const bdg       = document.getElementById('bdg');
const sTotalP   = document.getElementById('sTotalP');
const sTotalC   = document.getElementById('sTotalC');
const chipsCard = document.getElementById('chipsCard');
const chipsEl   = document.getElementById('chipsEl');
const vcard     = document.getElementById('vcard');
const resetRow  = document.getElementById('resetRow');
const darkBtn   = document.getElementById('darkBtn');

// ── State ───────────────────────────────────────────
let gen   = {};    // pname -> [{text, dataUrl}]
let viMap = {};    // pname -> joriy index (pozitsiya saqlanadi)
let active = null;

// vi — aktiv mahsulotning joriy pozitsiyasi (xuddi miyras-pro-v2 dagi kabi)
Object.defineProperty(window, 'vi', {
  get(){ return viMap[active] ?? 0; },
  set(v){ if(active) viMap[active] = v; }
});

// ── Helpers ────────────────────────────────────────
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function blobToDataUrl(blob){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

// ZIP ichidagi fayl nomidan mahsulot nomini aniqlash
// "Sarbast Original CAN 0,45L/Sarbast_Original_CAN_0_45L_001.png"
// yoki "Sarbast_Original_CAN_0_45L.png"
function parseFilePath(path){
  const parts = path.split('/');
  if(parts.length >= 2){
    // Papka nomi = mahsulot nomi (bo'sh joy _ bilan almashtirilgan)
    const folder = parts[0].replace(/_/g,' ').trim();
    const file   = parts[parts.length-1].replace(/\.png$/i,'');
    const numM   = file.match(/_(\d+)$/);
    return { product: folder, num: numM ? parseInt(numM[1]) : 1 };
  }
  // Bitta fayl: ProductName_001.png yoki ProductName.png
  const fname = parts[0].replace(/\.png$/i,'');
  const m = fname.match(/^(.+?)_(\d+)$/);
  if(m) return { product: m[1].replace(/_/g,' ').trim(), num: parseInt(m[2]) };
  return { product: fname.replace(/_/g,' ').trim(), num: 1 };
}

function updateStats(){
  const keys = Object.keys(gen);
  const total = keys.reduce((s,k)=>s+gen[k].length, 0);
  sTotalP.textContent = keys.length;
  sTotalC.textContent = total;
  bdg.textContent     = total + ' kod';
}

// ── Dark mode ──────────────────────────────────────
darkBtn.addEventListener('click',()=>{
  document.body.classList.toggle('light');
  darkBtn.innerHTML = document.body.classList.contains('light')
    ? '<i class="fas fa-moon"></i> Dark'
    : '<i class="fas fa-sun"></i> Light';
});

// ── Drop / File input ──────────────────────────────
dropZone.addEventListener('dragover', e=>{ e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e=>{
  e.preventDefault(); dropZone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if(f) processZip(f);
});
zipInput.addEventListener('change', e=>{
  const f = e.target.files[0];
  if(f) processZip(f);
  zipInput.value = '';
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  gen = {}; viMap = {}; active = null;
  updateStats();
  dropZone.style.display  = 'block';
  resetRow.style.display  = 'none';
  chipsCard.style.display = 'none';
  vcard.style.display     = 'none';
  pw.style.display        = 'none';
  pf.style.width          = '0%';
});

// ── Process ZIP ────────────────────────────────────
async function processZip(file){
  if(!file.name.toLowerCase().endsWith('.zip')){
    alert("Faqat .zip fayl yuklang!"); return;
  }

  // UI tayyorlash
  dropZone.style.display = 'none';
  pw.style.display = 'block';
  pf.style.width   = '0%';
  pl.textContent   = 'ZIP ochilmoqda...';

  let zip;
  try{
    const ab = await file.arrayBuffer();
    zip = await JSZip.loadAsync(ab);
  } catch(e){
    alert("ZIP o'qib bo'lmadi: " + e.message);
    dropZone.style.display = 'block';
    pw.style.display = 'none';
    return;
  }

  // Faqat PNG fayllar
  const pngFiles = Object.keys(zip.files).filter(n=>
    !zip.files[n].dir &&
    n.toLowerCase().endsWith('.png') &&
    !n.startsWith('__MACOSX')
  );

  if(!pngFiles.length){
    alert("ZIP ichida PNG fayl topilmadi.");
    dropZone.style.display = 'block';
    pw.style.display = 'none';
    return;
  }

  gen = {}; viMap = {}; active = null;
  const total = pngFiles.length;

  for(let i=0; i<total; i++){
    const path = pngFiles[i];
    const { product, num } = parseFilePath(path);

    pl.textContent = product + ' · ' + (i+1) + ' / ' + total;
    pf.style.width = Math.round(((i+1)/total)*100) + '%';

    try{
      const blob    = await zip.files[path].async('blob');
      const dataUrl = await blobToDataUrl(blob);
      const fname   = path.split('/').pop().replace(/\.png$/i,'');

      if(!gen[product]) gen[product] = [];
      gen[product].push({ text: fname, dataUrl, num });
    } catch(e){ /* skip broken */ }

    if(i % 15 === 0) await sleep(10);
  }

  // Har mahsulot kodlarini tartiblab chiqish
  Object.values(gen).forEach(arr => arr.sort((a,b)=>a.num-b.num));

  pw.style.display = 'none';

  const keys = Object.keys(gen);
  if(!keys.length){ alert("Hech narsa yuklanmadi."); dropZone.style.display='block'; return; }

  active = keys[0];
  // viMap — hamma mahsulot 0 dan boshlanadi
  keys.forEach(k => viMap[k] = 0);

  updateStats();
  renderChips();
  renderViewer();
  resetRow.style.display = 'block';
}

// ── Chips ──────────────────────────────────────────
function renderChips(){
  const keys = Object.keys(gen);
  chipsCard.style.display = keys.length ? 'block' : 'none';
  chipsEl.innerHTML = keys.map(n=>`
    <div class="chip${n===active?' on':''}" onclick="SW('${esc(n)}')">
      <i class="fas fa-box-open" style="font-size:.75rem"></i>
      ${esc(n)}<span class="cnt">${gen[n].length}</span>
    </div>`).join('');
}

// Mahsulot almashganda vi RESET BO'LMAYDI — viMap da saqlangan qoladi
window.SW = function(n){
  active = n;
  renderChips();
  renderViewer('sR');
};

// ── Viewer ─────────────────────────────────────────
function renderViewer(anim=''){
  vcard.style.display = 'block';

  if(!active || !gen[active]){
    vcard.innerHTML = `<div class="ph-box"><i class="fas fa-smile-wink"></i><p>ZIP faylni yuklang.</p></div>`;
    return;
  }

  const codes = gen[active];
  const item  = codes[vi];
  const keys  = Object.keys(gen);

  const tabs = keys.length > 1
    ? `<div class="vtabs">${keys.map(n=>`
        <div class="vtab${n===active?' on':''}" onclick="SW('${esc(n)}')">${esc(n)} <span style="opacity:.6">(${gen[n].length})</span></div>`
      ).join('')}</div>`
    : '';

  vcard.innerHTML = `
    <div class="vpname"><i class="fas fa-box-open"></i>${esc(active)}</div>
    ${tabs}
    <div id="vc" class="${anim}">
      <div class="qbox"><img src="${item.dataUrl}" alt="DM" loading="lazy"></div><br>
      <div class="qtxt">${esc(item.text)}</div>
      <div class="qidx">${vi+1} / ${codes.length}</div>
      <button class="dl1" id="dl1"><i class="fas fa-download"></i> Yuklab olish</button>
    </div>
    <div class="navrow">
      <div class="nb" id="nb_p"><i class="fas fa-chevron-up"></i></div>
      <div class="nb" id="nb_n"><i class="fas fa-chevron-down"></i></div>
    </div>`;

  document.getElementById('nb_p').onclick = ()=>{ if(vi>0){ vi--; renderViewer('sL'); } };
  document.getElementById('nb_n').onclick = ()=>{ if(vi<codes.length-1){ vi++; renderViewer('sR'); } };
  document.getElementById('dl1').onclick  = ()=> dlOne(active, vi);
}

// ── Download one ────────────────────────────────────
async function dlOne(pname, idx){
  const item = gen[pname][idx];
  if(!item) return;
  const blob = await (await fetch(item.dataUrl)).blob();
  const a = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = item.text + '.png';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Touch swipe (telefon uchun) ─────────────────────
let tx = 0;
vcard.addEventListener('touchstart', e=>{ tx = e.touches[0].clientX; }, {passive:true});
vcard.addEventListener('touchend',   e=>{
  const dx = e.changedTouches[0].clientX - tx;
  if(Math.abs(dx) < 40) return;
  if(!active || !gen[active]) return;
  const codes = gen[active];
  if(dx < 0 && vi < codes.length-1){ vi++; renderViewer('sR'); }
  if(dx > 0 && vi > 0)             { vi--; renderViewer('sL'); }
}, {passive:true});

// ── Keyboard ────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(!active || !gen[active]) return;
  const codes = gen[active];
  if(e.key==='ArrowDown'||e.key==='ArrowRight'){
    if(vi < codes.length-1){ vi++; renderViewer('sR'); }
  }
  if(e.key==='ArrowUp'||e.key==='ArrowLeft'){
    if(vi > 0){ vi--; renderViewer('sL'); }
  }
});

})();
</script>
